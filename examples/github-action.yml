name: PR Review Bot — AI Code Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > /tmp/pr.diff
          echo "size=$(wc -c < /tmp/pr.diff)" >> $GITHUB_OUTPUT
          git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD > /tmp/changed_files.txt

      - name: Skip if diff too large
        if: steps.diff.outputs.size > 500000
        run: echo "Diff too large (${{ steps.diff.outputs.size }} bytes), skipping"

      - name: AI Code Review
        if: steps.diff.outputs.size <= 500000
        env:
          OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
        run: |
          # This is a placeholder — the actual review runs via the pr-review-bot action
          # See: https://github.com/itsTimWhite/pr-review-bot
          echo "PR Review Bot would run here"
          echo "Use: uses: itsTimWhite/pr-review-bot@v1"
