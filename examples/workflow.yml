# Example: Add AI code review to your repo
# Copy this to .github/workflows/ai-review.yml in your repo

name: AI Code Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - run: pip install requests

      - name: Review PR
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          curl -sL https://raw.githubusercontent.com/itsTimWhite/pr-review-bot/main/scripts/review.py -o /tmp/review.py
          python3 /tmp/review.py --repo ${{ github.repository }} --pr ${{ github.event.pull_request.number }}
